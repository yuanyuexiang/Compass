# 生产编排：由 GitHub Actions 同步到服务器 /opt/compass/ 并拉起。
# 镜像坐标与 TAG 由部署脚本以环境变量注入；业务密钥在服务器侧 /opt/compass/.env。

x-backend: &backend
  image: ${REGISTRY}/${NAMESPACE}/compass-backend:${TAG:-latest}
  env_file: .env
  environment:
    DATABASE_URL: postgresql+psycopg://compass:${POSTGRES_PASSWORD}@postgres:5432/compass
    REDIS_URL: redis://redis:6379/0
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-compass}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: compass
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 /opt/compass/.env 中设置}
      POSTGRES_DB: compass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compass"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-compass}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?请在 /opt/compass/.env 中设置}
    volumes:
      - miniodata:/data
    restart: unless-stopped

  api:
    <<: *backend
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8300:8000"  # 仅本机回环（SSH 隧道调试用）；公网流量一律走 Traefik → frontend 反代

  worker:
    <<: *backend
    command: celery -A app.tasks.celery_app worker -l info --concurrency 4

  beat:
    <<: *backend
    command: celery -A app.tasks.celery_app beat -l info

  frontend:
    image: ${REGISTRY}/${NAMESPACE}/compass-frontend:${TAG:-latest}
    networks:
      - default
      - matrix-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=matrix-network
      - traefik.http.routers.compass.rule=Host(`compass.matrix-net.tech`)
      - traefik.http.routers.compass.entrypoints=websecure
      - traefik.http.routers.compass.tls=true
      - traefik.http.routers.compass.tls.certresolver=aliyunresolver
      - traefik.http.services.compass.loadbalancer.server.port=3000
    depends_on:
      - api
    restart: unless-stopped

networks:
  # Traefik 所在的共享外部网络（由另一套 compose 创建）
  matrix-network:
    external: true

volumes:
  pgdata:
  miniodata:
